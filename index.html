    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24 }
    
    body {

      background-image: radial-gradient(at 0% 0%, rgba(61, 139, 139, .03) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(197, 160, 107, .03) 0px, transparent 50%);

      overflow-x: hidden
    }
    
    .dark body, .dark { background-color: #181c1c; color: #e0e3e3 }
    .dark body { background-image: radial-gradient(at 0% 0%, rgba(135, 211, 211, .05) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(232, 192, 136, .05) 0px, transparent 50%) }
    
    .editorial-shadow { box-shadow: 0 10px 30px rgba(7, 103, 103, .04) }
    .dark .editorial-shadow { box-shadow: 0 10px 30px rgba(0, 0, 0, .3) }
    .dark .dark\:bg-d { background: #0b0f0f }
    .dark .dark\:bg-card { background: #1e2222 }
    .dark .dark\:border-db { border-color: #323636 }
    .dark .dark\:text-p { color: #87d3d3 }
    .dark .dark\:text-s { color: #e8c088 }
    .dark .dark\:text-sv { color: #bfc8c8 }
    .dark .dark\:bg-sc { background: #282b2b }
    .dark .dark\:bg-scl { background: #1c2020 }
    
    .bg-shapes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden }
    .bg-shape { position: absolute; border-radius: 50%; opacity: .035 }
    .dark .bg-shape { opacity: .04 }
    
    @keyframes drift1 {
      0% { transform: translate(0, 0) scale(1) }
      25% { transform: translate(60px, -40px) scale(1.1) }
      50% { transform: translate(-30px, 70px) scale(.95) }
      75% { transform: translate(40px, 30px) scale(1.05) }
      100% { transform: translate(0, 0) scale(1) }
    }
    @keyframes drift2 {
      0% { transform: translate(0, 0) rotate(0deg) }
      33% { transform: translate(-50px, 40px) rotate(120deg) }
      66% { transform: translate(30px, -60px) rotate(240deg) }
      100% { transform: translate(0, 0) rotate(360deg) }
    }
    @keyframes drift3 {
      0% { transform: translate(0, 0) scale(1) }
      50% { transform: translate(70px, 50px) scale(1.15) }
      100% { transform: translate(0, 0) scale(1) }
    }
    
    .bg-s1 { width: 400px; height: 400px; top: 10%; left: -5%; background: #3D8B8B; animation: drift1 25s ease-in-out infinite }
    .bg-s2 { width: 300px; height: 300px; top: 60%; right: -3%; background: #e8c088; animation: drift2 30s linear infinite }
    .bg-s3 { width: 250px; height: 250px; top: 30%; left: 50%; background: #87d3d3; animation: drift3 20s ease-in-out infinite; border-radius: 30% }
    .bg-s4 { width: 180px; height: 180px; bottom: 15%; left: 20%; background: #3D8B8B; animation: drift1 22s ease-in-out infinite reverse }
    .bg-s5 { width: 220px; height: 220px; top: 5%; right: 25%; background: #e8c088; animation: drift3 28s ease-in-out infinite; border-radius: 40% }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px) }
      to { opacity: 1; transform: translateY(0) }
    }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    
    .animate-fade-up { animation: fadeUp .5s ease both }
    .animate-fade-in { animation: fadeIn .3s ease both }
    
    .q-card { transition: all .3s cubic-bezier(.4, 0, .2, 1) }
    .q-card:hover { transform: translateY(-2px); box-shadow: 0 16px 40px rgba(7, 103, 103, .08) }
    .dark .q-card:hover { box-shadow: 0 16px 40px rgba(0, 0, 0, .4) }
    
    .option-label { transition: all .2s ease }

    .dark .option-label:hover { background: rgba(135, 211, 211, .06) !important }
    
    .correct-answer { border-color: #3D8B8B !important; background: rgba(61, 139, 139, .06) !important }
    .dark .correct-answer { background: rgba(135, 211, 211, .08) !important; border-color: #87d3d3 !important }

    }
    .dark .lang-btn.active {

      color: #1e2222;
      box-shadow: 0 2px 8px rgba(232, 192, 136, 0.3);
    }
    .lang-btn:hover:not(.active) {
      background: rgba(197, 160, 107, 0.2);
    }
    
    .exp-text { display: none; animation: fadeIn 0.3s ease; }
    .exp-text.active { display: block; }
    
    .reveal-content { display: none; margin-top: 0.25rem; }
    
    .btn-reveal {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      font-weight: 700;
      border-radius: 0.75rem;
      transition: all 0.2s ease;
      margin-top: 0.75rem;
      cursor: pointer;
    }
    .btn-reveal-exp { background: rgba(61, 139, 139, 0.1); color: #3D8B8B; }
    .dark .btn-reveal-exp { background: rgba(135, 211, 211, 0.1); color: #87d3d3; }
    .btn-reveal-correct { background: rgba(197, 160, 107, 0.1); color: #77592b; }
    .dark .btn-reveal-correct { background: rgba(232, 192, 136, 0.1); color: #e8c088; }
    .btn-reveal:hover { transform: translateY(-1px); filter: brightness(1.05); }
    
    /* KaTeX specific styling */
    .katex { font-size: 1.1em; }
    .option-label .katex { font-size: 1.05em; }
    
    .progress-glow { animation: pulse-glow 2s ease-in-out infinite }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 8px rgba(61, 139, 139, .2) }
      50% { box-shadow: 0 0 20px rgba(61, 139, 139, .4) }
    }
    
    .btn-press { transition: all .15s ease }
    .btn-press:active { transform: scale(.96) }
    
    .slide-item { transition: all .25s ease }
    .slide-item:hover { background: rgba(61, 139, 139, .04) }
    .dark .slide-item:hover { background: rgba(135, 211, 211, .06) }
    .slide-item.active-slide { background: rgba(61, 139, 139, .08); border-color: #3D8B8B !important }
    .dark .slide-item.active-slide { background: rgba(135, 211, 211, .1); border-color: #87d3d3 !important }
    
    .pdf-viewer { min-height: 70vh; border-radius: 1.5rem; overflow: hidden }
    .pdf-frame { width: 100%; height: 70vh; border: none }
    
    ::-webkit-scrollbar { width: 6px }
    ::-webkit-scrollbar-track { background: transparent }
    ::-webkit-scrollbar-thumb { background: #bec9c8; border-radius: 3px }
    .dark ::-webkit-scrollbar-thumb { background: #3f4948 }
    
    .animate-pray { animation: pray-glow 3s ease-in-out infinite }
    @keyframes pray-glow {
      0%, 100% { transform: scale(1) translateY(0); filter: drop-shadow(0 0 0px rgba(61, 139, 139, 0)) }
      50% { transform: scale(1.08) translateY(-4px); filter: drop-shadow(0 4px 12px rgba(61, 139, 139, .3)) }
    }
    .animate-twinkle { animation: twinkle 3s ease-in-out infinite }
    @keyframes twinkle {
      0%, 100% { opacity: .6; transform: scale(1) }
      50% { opacity: 1; transform: scale(1.15) }
    }
  </style>
</head>

    function buildQuestions() {
      const container = document.getElementById('questions-container');
      container.innerHTML = '';
      
      document.getElementById('total-count').textContent = quizData.length;
      
      if (quizData.length === 0) {
        container.innerHTML = `
          <div class="text-center py-20 opacity-50">
            <span class="material-symbols-outlined text-6xl mb-4">edit_note</span>
            <p class="font-headline text-xl">No questions added yet</p>
            <p class="text-sm mt-2">Add questions to the quizData array in the code</p>
          </div>
        `;
        return;
      }
      
      quizData.forEach((q, idx) => {
        const num = String(q.n).padStart(2,'0');
        const delay = Math.min(idx * 20, 500);
        
        const hasImage = q.hasImage || false;
        const imageHtml = hasImage ? `
          <div class="q-image-container">
            <img src="q${q.n}.png" alt="Diagram for question ${q.n}" class="q-image" onerror="this.src='q${q.n}.jpg'; this.onerror=function(){this.style.display='none';}">
            <div class="q-image-caption">
              <span class="material-symbols-outlined text-sm align-middle mr-1">image</span>
              Figure ${q.n}
            </div>
          </div>
        ` : '';
        
        let optsHtml = q.opts.map((opt, oi) => `<label class="option-label relative flex items-center gap-3 md:gap-4 p-3 md:p-4 rounded-2xl border border-outline-variant/20 dark:border-db cursor-pointer hover:bg-surface-container-low dark:hover:bg-scl transition-all">
          <input type="radio" name="q${q.n}" value="${letters[oi]}" class="w-4 h-4 md:w-5 md:h-5 text-primary focus:ring-primary border-outline-variant bg-transparent accent-[#3D8B8B]">
          <span class="font-body text-sm md:text-base text-on-surface-variant dark:text-sv font-medium">${letters[oi]}) ${opt}</span>
        </label>`).join('');
        
        container.innerHTML += `<article class="q-card bg-white dark:bg-card rounded-[1.5rem] md:rounded-[2rem] p-5 md:p-8 editorial-shadow border border-surface-container-high dark:border-db animate-fade-up" style="animation-delay:${delay}ms" data-qnum="${q.n}">
          <div class="flex flex-col gap-4 md:gap-6">
            <div class="flex justify-between items-start">
              <span class="font-label text-[10px] md:text-xs font-bold text-secondary dark:text-s uppercase tracking-widest bg-secondary-fixed/30 dark:bg-amber-900/20 px-3 py-1 rounded-full">Question ${num}</span>
            </div>
            <h3 class="font-headline text-base md:text-xl font-bold text-on-surface dark:text-white leading-snug">${q.q}</h3>
            ${imageHtml}
            <div class="grid grid-cols-1 gap-3 md:gap-4">${optsHtml}</div>
            <div class="flex flex-col gap-3">
              <div class="answer-feedback hidden" id="feedback-${q.n}"></div>
              <div class="reveal-content" id="reveal-${q.n}">
                <div class="exp-box exp-visible">
                  <div class="lang-toggle">
                    <button class="lang-btn ${currentLang === 'en' ? 'active' : ''}" onclick="toggleExplanationLang(${q.n}, 'en')">EN</button>
                    <button class="lang-btn ${currentLang === 'ar' ? 'active' : ''}" onclick="toggleExplanationLang(${q.n}, 'ar')">عربي</button>
                  </div>
                  <div class="items-start gap-3 flex mt-2">
                    <span class="material-symbols-outlined text-secondary dark:text-s text-xl flex-shrink-0 mt-1">info</span>
                    <div class="text-sm md:text-base leading-relaxed text-on-surface-variant dark:text-sv w-full">
                      <p class="font-bold mb-2 text-secondary dark:text-s">Explanation:</p>

      document.querySelectorAll('input[type="radio"]').forEach(radio => radio.addEventListener('change', handleAnswer));
      
      // Render KaTeX math after building questions
      if (typeof renderMathInElement !== 'undefined') {
        renderMathInElement(document.getElementById('questions-container'), {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '\\(', right: '\\)', display: false},
            {left: '$', right: '$', display: false}
          ],
          throwOnError: false
        });
      }
    }

    function toggleExplanationLang(qNum, lang) {
      currentLang = lang;
      localStorage.setItem('explanation-lang', lang);
      
      const card = document.querySelector(`[data-qnum="${qNum}"]`);
      card.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', 
          (lang === 'en' && btn.textContent === 'EN') || 
          (lang === 'ar' && btn.textContent === 'عربي')
        );
      });
      
      const enText = document.getElementById(`exp-${qNum}-en`);
      const arText = document.getElementById(`exp-${qNum}-ar`);
      
      if(lang === 'en') {
        arText.classList.remove('active');
        setTimeout(() => enText.classList.add('active'), 50);
      } else {
        enText.classList.remove('active');
        setTimeout(() => arText.classList.add('active'), 50);
      }
    }

    function handleAnswer(e) {
      const qNum = parseInt(e.target.name.substring(1));
      const selected = e.target.value;
      const qData = quizData.find(q => q.n === qNum);
      const feedback = document.getElementById(`feedback-${qNum}`);
      const card = e.target.closest('.q-card');
      card.querySelectorAll('.option-label').forEach(l => l.classList.remove('correct-answer','incorrect-answer'));
      const isCorrect = selected === qData.ans;
      const selectedLabel = e.target.closest('.option-label');
      if(isCorrect) {
        selectedLabel.classList.add('correct-answer');
        feedback.className = 'answer-feedback answer-correct animate-fade-up';
        feedback.innerHTML = `<div class="flex flex-col items-start gap-2"><span class="font-bold text-primary dark:text-p">✅ Correct!</span><button onclick="revealPart(${qNum})" class="btn-reveal btn-reveal-exp" id="btn-reveal-${qNum}"><span class="material-symbols-outlined text-sm">lightbulb</span>Show Explanation</button></div>`;
      } else {
        selectedLabel.classList.add('incorrect-answer');
        feedback.className = 'answer-feedback answer-incorrect animate-fade-up';
        feedback.innerHTML = `<div class="flex flex-col items-start gap-2"><span class="font-bold text-error">❌ Incorrect</span><button onclick="revealPart(${qNum}, true)" class="btn-reveal btn-reveal-correct" id="btn-reveal-${qNum}"><span class="material-symbols-outlined text-sm">visibility</span>Show Correct Choice</button></div>`;
      }
      feedback.classList.remove('hidden');
      document.getElementById(`reveal-${qNum}`).style.display = 'none';
      updateProgress();
    }

    function revealPart(n, showAnswer = false) {
      const revealBox = document.getElementById(`reveal-${n}`);
      const btn = document.getElementById(`btn-reveal-${n}`);
      const qData = quizData.find(q => q.n === n);
      if(revealBox) revealBox.style.display = 'block';
      if(btn) btn.style.display = 'none';
      if(showAnswer) {
        const feedback = document.getElementById(`feedback-${n}`);
        const card = feedback.closest('.q-card');
        const correctIdx = letters.indexOf(qData.ans);
        card.querySelectorAll('.option-label')[correctIdx].classList.add('correct-answer');
        feedback.querySelector('span').innerHTML = `❌ Incorrect — Correct answer: <strong class="text-primary dark:text-p">${qData.ans.toUpperCase()}</strong>`;
      }
      // Re-render math in explanation if needed
      if (typeof renderMathInElement !== 'undefined') {
        renderMathInElement(revealBox, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '\\(', right: '\\)', display: false},
            {left: '$', right: '$', display: false}
          ],
          throwOnError: false
        });
      }
    }

    function showAllAnswers() { 
      quizData.forEach(q => { 
        const card = document.querySelector(`[data-qnum="${q.n}"]`); 
        if(!card) return; 
        const correctIdx = letters.indexOf(q.ans); 
        const labels = card.querySelectorAll('.option-label'); 
        labels.forEach(l=>l.classList.remove('correct-answer','incorrect-answer')); 
        labels[correctIdx].classList.add('correct-answer'); 
        labels[correctIdx].querySelector('input').checked = true; 
        const feedback = document.getElementById(`feedback-${q.n}`); 
        feedback.className='answer-feedback answer-correct animate-fade-up'; 
        feedback.innerHTML=`<span class="font-bold text-primary dark:text-p">✅ Correct Answer: ${q.ans.toUpperCase()}</span>`; 
        feedback.classList.remove('hidden'); 
        revealPart(q.n); 
      }); 
      updateProgress(); 
    }
    
    function hideAllAnswers() { 
      quizData.forEach(q => { 
        const card = document.querySelector(`[data-qnum="${q.n}"]`); 
        if(!card) return; 
        card.querySelectorAll('.option-label').forEach(l=>l.classList.remove('correct-answer','incorrect-answer')); 
        card.querySelectorAll('input[type="radio"]').forEach(r=>r.checked=false); 
        const fb = document.getElementById(`feedback-${q.n}`); 
        fb.classList.add('hidden'); 
        fb.innerHTML=''; 
        const rev = document.getElementById(`reveal-${q.n}`); 
        if(rev) rev.style.display='none'; 
      }); 
      updateProgress(); 
    }
    
    function resetQuiz() { 
      document.querySelectorAll('input[type="radio"]').forEach(r=>r.checked=false); 
      hideAllAnswers(); 
      updateProgress(); 
      window.scrollTo({top:0,behavior:'smooth'}); 
    }
    
    function updateProgress() { 
      const answered = document.querySelectorAll('input[type="radio"]:checked').length; 
      document.getElementById('answered-count').textContent = answered; 
      const total = quizData.length || 1;
      document.getElementById('progress-bar').style.width = `${(answered/total)*100}%`; 
    }

    let activeSlideIdx = 0;
    function buildSlides() {
      const list = document.getElementById('slides-list');
      list.innerHTML = lectures.map((l,i) => {
        const isActive = i === activeSlideIdx;
        return `<div class="slide-item flex flex-col md:flex-row items-stretch md:items-center gap-4 p-4 rounded-[1.5rem] border ${isActive ? 'active-slide border-primary/30 dark:border-primary-fixed-dim/30 bg-primary/5 dark:bg-primary-fixed-dim/5' : 'border-outline-variant/20 dark:border-db'} bg-white dark:bg-card cursor-pointer animate-fade-up transition-all hover:border-primary/20" data-slide-idx="${i}" onclick="selectSlide(${i})">
          <!-- Slide Preview Thumbnail -->
          <div class="flex-shrink-0 w-full md:w-32 h-24 rounded-2xl overflow-hidden bg-slate-100 dark:bg-scl border border-outline-variant/10 dark:border-db relative shadow-sm group">
            <video class="w-full h-full object-cover" preload="metadata" muted>
              <source src="${l.video}#t=5" type="video/mp4">
            </video>
            <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all">
              <span class="material-symbols-outlined text-white text-3xl">play_arrow</span>
            </div>
            <!-- Lecture Badge -->
            <div class="absolute bottom-2 right-2 bg-black/75 text-[#87d3d3] text-[10px] px-2 py-0.5 rounded-lg font-bold tracking-wider uppercase">
              Lec ${i+1}
            </div>
          </div>
          
          <div class="flex-1 min-w-0 py-1 flex flex-col justify-center">
            <h3 class="font-headline font-bold text-on-surface dark:text-white text-base md:text-lg truncate">${l.name}</h3>
            <p class="text-on-surface-variant dark:text-sv text-xs mt-1 flex items-center gap-1.5">
              <span class="material-symbols-outlined text-xs">picture_as_pdf</span> PDF Slide
              <span class="text-outline-variant/40">•</span>
              <span class="material-symbols-outlined text-xs">play_circle</span> Video Explanation
            </p>
          </div>
          
          <div class="flex items-center gap-2 flex-shrink-0 mt-3 md:mt-0">
            <button onclick="event.stopPropagation();selectSlide(${i});switchTab('pdf')" class="flex-1 md:flex-none px-4 py-2 ${isActive ? 'bg-primary dark:bg-primary-fixed-dim text-white dark:text-on-primary-fixed' : 'bg-surface-container-low dark:bg-scl text-on-surface-variant dark:text-sv hover:bg-surface-container'} rounded-xl text-xs font-semibold btn-press transition-all flex items-center justify-center gap-1.5">
              <span class="material-symbols-outlined text-sm">visibility</span>View Slide
            </button>
            <button onclick="event.stopPropagation();selectSlide(${i});switchTab('video')" class="flex-1 md:flex-none px-4 py-2 bg-surface-container-low dark:bg-scl text-on-surface-variant dark:text-sv rounded-xl text-xs font-semibold btn-press hover:bg-surface-container dark:hover:bg-sc transition-all flex items-center justify-center gap-1.5">
              <span class="material-symbols-outlined text-sm">play_circle</span>Watch Video
            </button>
          </div>
        </div>`;
      }).join('');
    }
    
    function selectSlide(idx) { 
      activeSlideIdx = idx; 
      const l = lectures[idx]; 
      currentPdf = l.file; 
      buildSlides(); 
      
      document.getElementById('pdf-title').textContent = l.name; 
      document.getElementById('pdf-frame').src = l.file; 
      
      const videoEl = document.getElementById('slide-video');
      if (videoEl) {
        videoEl.src = l.video;
        videoEl.load();
      }
      
      const viewerWrap = document.getElementById('pdf-viewer-wrap');
      viewerWrap.classList.remove('hidden'); 
      viewerWrap.scrollIntoView({behavior:'smooth',block:'start'}); 
    }
    
    function switchTab(tab) {
      const btnPdf = document.getElementById('tab-btn-pdf');
      const btnVideo = document.getElementById('tab-btn-video');
      const panelPdf = document.getElementById('panel-pdf');
      const panelVideo = document.getElementById('panel-video');
      
      const activeClasses = ['bg-primary', 'dark:bg-primary-fixed-dim', 'text-white', 'dark:text-on-primary-fixed', 'shadow-md'];
      const inactiveClasses = ['text-on-surface-variant', 'dark:text-sv', 'hover:bg-surface-container', 'dark:hover:bg-sc'];
      
      const videoEl = document.getElementById('slide-video');

      if (tab === 'pdf') {
        if (videoEl) videoEl.pause();
        panelPdf.classList.remove('hidden');
        panelVideo.classList.add('hidden');
        
        btnPdf.className = "px-5 py-2.5 rounded-xl text-sm font-semibold transition-all flex items-center gap-2 " + activeClasses.join(' ');
        btnVideo.className = "px-5 py-2.5 rounded-xl text-sm font-semibold transition-all flex items-center gap-2 " + inactiveClasses.join(' ');
      } else {
        panelPdf.classList.add('hidden');
        panelVideo.classList.remove('hidden');
        
        btnVideo.className = "px-5 py-2.5 rounded-xl text-sm font-semibold transition-all flex items-center gap-2 " + activeClasses.join(' ');
        btnPdf.className = "px-5 py-2.5 rounded-xl text-sm font-semibold transition-all flex items-center gap-2 " + inactiveClasses.join(' ');
      }
    }
    
    function openPdfNewTab(idx) { window.open(lectures[idx].file, '_blank'); }
    
    function downloadCurrentPdf() { 
      if(!currentPdf) return; 
      const a = document.createElement('a'); 
      a.href = currentPdf; 
      a.download = currentPdf; 
      a.click(); 
    }
    
    function showSection(section) { 
      const quizDiv=document.getElementById('quiz-section'), slidesDiv=document.getElementById('slides-section'); 
      const navQuiz=document.getElementById('nav-quiz'), navSlides=document.getElementById('nav-slides'); 
      const active=['bg-white','dark:bg-card','shadow-sm','rounded-full','text-primary','dark:text-p','font-bold']; 
      const inactive=['text-on-surface-variant','dark:text-sv','font-medium']; 
      if(section==='quiz') { 
        quizDiv.classList.remove('hidden'); 
        slidesDiv.classList.add('hidden'); 
        navQuiz.classList.add(...active); 
        navQuiz.classList.remove(...inactive); 
        navSlides.classList.remove(...active); 
        navSlides.classList.add(...inactive); 
      } else { 
        quizDiv.classList.add('hidden'); 
        slidesDiv.classList.remove('hidden'); 
        navSlides.classList.add(...active); 
        navSlides.classList.remove(...inactive); 
        navQuiz.classList.remove(...active); 
        navQuiz.classList.add(...inactive); 
      } 
      window.scrollTo({top:0,behavior:'smooth'}); 
    }
    
    function toggleTheme() { 
      const html=document.documentElement; 
      const isDark=html.classList.contains('dark'); 
      html.classList.toggle('dark'); 
      const icon=isDark ? 'dark_mode' : 'light_mode'; 
      document.querySelectorAll('#themeToggleMobile .material-symbols-outlined, #themeToggleDesktop .material-symbols-outlined').forEach(el=>el.textContent=icon); 
      localStorage.setItem('cg-theme',isDark?'light':'dark'); 
    }
    
    document.addEventListener('DOMContentLoaded',()=> { 
      const saved=localStorage.getItem('cg-theme'); 
      if(saved==='dark'){ 
        document.documentElement.classList.add('dark'); 
        document.querySelectorAll('#themeToggleMobile .material-symbols-outlined, #themeToggleDesktop .material-symbols-outlined').forEach(el=>el.textContent='light_mode'); 
      } 
      buildQuestions(); 
      buildSlides(); 
      if(window.innerWidth>=768 && lectures.length > 0){ 
        selectSlide(0);
        switchTab('pdf');
      } else if (lectures.length > 0) {
        const l = lectures[0];
        document.getElementById('pdf-title').textContent = l.name; 
        document.getElementById('pdf-frame').src = l.file; 
        const videoEl = document.getElementById('slide-video');
        if (videoEl) videoEl.src = l.video;
      }
    });
  </script>
</body>
</html>
